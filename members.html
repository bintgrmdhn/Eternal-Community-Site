{% extends "base.html" %}

{% block title %}Our Team - ETERNAL{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <h1 class="section-title">Our Team</h1>
        <p class="section-subtitle">Keluarga besar yang membangun ETERNAL setiap hari</p>
        
        <div class="members-grid">
            {% for member in members %}
            <div class="member-card" style="--delay: {{ loop.index0 * 0.1 }}s;">
                <div class="member-profile">
                    <div class="profile-image">
                        <img src="{{ url_for('static', filename='images/' + member.avatar) }}" 
                             alt="{{ member.name }}" 
                             loading="lazy">
                        <div class="profile-status online"></div>
                    </div>
                    <h3>{{ member.name }}</h3>
                    <div class="member-role">{{ member.role }}</div>
                    <div class="join-date">
                        <i class="fas fa-calendar"></i>
                        {{ member.join_date }}
                    </div>
                </div>
                
                <div class="member-social">
                    <a href="{{ member.instagram }}" class="social-btn instagram" target="_blank" rel="noopener">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://discord.com/users/{{ member.discord }}" class="social-btn discord" target="_blank" rel="noopener">
                        <i class="fab fa-discord"></i>
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
        
        <div style="text-align: center; margin-top: 4rem;">
            <a href="{{ url_for('top_members') }}" class="btn">Lihat Top Members →</a>
        </div>
    </div>
</section>
{% endblock %}
